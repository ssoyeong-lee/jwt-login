<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<h1 id="hh">로그인 전</h1>
    <button onclick="clickLoginBtn(this.id)">login 버튼</button>
    <button onclick="clickGetBtn(this.id)">GET</button>
    <button onclick="clickRefresh(this.id)">Refresh</button>
    <button onclick="clickLogout(this.id)">logout</button>
    <div id="bb"></div>
</body>
<script type="text/javascript">
    const hh = document.getElementById('hh');
    const bb = document.getElementById('bb');

    function clickLoginBtn(btnId) {
        fetch("http://localhost:8080/login", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            credentials: 'include',
            body: JSON.stringify({"username": "user", "password": "1234"})
        }).then((response) => {
            console.log('로그인 요청 보내기 성공!');
            sessionStorage.setItem("authorizationHeader", response.headers.get('Authorization'));
            hh.innerText = '로그인 성공';
        });
    }

    function clickGetBtn(btnId) {
        fetch("http://localhost:8080", {
            headers: {"Authorization": sessionStorage.getItem("authorizationHeader")},
            credentials: 'include'
        }).then((response) => response.json())
        .then(data => {
            console.log(data);
            bb.innerText = JSON.stringify(data);
        });
    }

    function clickRefresh(btnId) {
        fetch("http://localhost:8080/auth/refresh", {
            headers: {"Authorization": sessionStorage.getItem("authorizationHeader")},
            credentials: 'include'
        }).then((response) => response.text())
        .then(data => {
            console.log(data);
            tmp = "Bearer " + data;
            bb.innerText = tmp;
            sessionStorage.setItem("authorizationHeader", tmp);
        });
    }

    function clickLogout(btnId) {
        fetch("http://localhost:8080/logout", {
            headers: {"Authorization": sessionStorage.getItem("authorizationHeader")},
            credentials: 'include'
        }).then((response) => response.text())
        .then(data => {
            console.log(data);
            sessionStorage.removeItem("authorizationHeader");
        });
    }
</script>
</html>
